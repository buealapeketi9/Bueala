<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>
</head>
<body>
    <h1>Loan Prediction using AI/ML</h1>

    <form action="/predict" method="POST">
        <input type="text" name="feature1" placeholder="Feature 1"><br><br>
        <input type="text" name="feature2" placeholder="Feature 2"><br><br>
        <input type="submit" value="Predict">
    </form>

    {% if prediction_text %}
    <h2>{{ prediction_text }}</h2>
    {% endif %}
</body>
</html>
